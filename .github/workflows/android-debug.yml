name: Android Debug Build

# Builds the debug APK and uploads it as a downloadable artifact.
# - push / PR to master: validates the build (and runs unit tests)
# - "Run workflow" button (workflow_dispatch): produce a debug APK on demand
on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

# A newer push to the same branch cancels an in-flight run for that branch.
concurrency:
  group: android-debug-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-debug:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # JDK 21 — matches the project's JBR/JDK 21 toolchain (AGP 9 requires JDK 17+).
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      # Gradle wrapper validation + build cache.
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # Android SDK + accept licenses so AGP 9 can auto-provision platforms/build-tools
      # (compileSdk 37) on first build.
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # The build reads openrouter.devKey from local.properties (gitignored).
      # In CI it's optional: with the secret set, debug builds can hit OpenRouter;
      # without it the key defaults to "" and the build still succeeds.
      - name: Configure local.properties
        env:
          OPENROUTER_DEV_KEY: ${{ secrets.OPENROUTER_DEV_KEY }}
        run: echo "openrouter.devKey=${OPENROUTER_DEV_KEY}" >> local.properties

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14

      # Unit tests run after the artifact is uploaded, so a test failure still
      # leaves a downloadable APK while surfacing a red check.
      - name: Run unit tests
        run: ./gradlew :app:testDebugUnitTest --stacktrace

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: app/build/reports/tests/testDebugUnitTest
          if-no-files-found: ignore
          retention-days: 7
